<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliment du jour ❤️</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="cursor-glow"></div>
    <div class="mouse-glow"></div>
    <div class="hearts-background" id="heartsBackground"></div>

    <div class="page">
        <section class="panel">
            <p class="section-label">Un message pour toi ❤️</p>

            <h1>Le compliment du jour</h1>

            <p class="compliment-explanation">
                Chaque jour jusqu’à ce que je rentre, tu trouveras ici un nouveau compliment et une raison pour laquelle
                je t’aime.
                C’est une petite façon pour moi d’être un peu avec toi tous les jours,
                même à distance.
            </p>

            <div class="compliment-box">
                <h2 id="complimentText"></h2>
                <p id="reasonText" class="compliment-reason"></p>
                <p id="dayCounter" class="compliment-day"></p>
            </div>

            <a href="index.html" class="back-button">
                ← Retour à l’accueil
            </a>
        </section>
    </div>

    <div class="floating-dock">
        <button class="dock-btn" id="datesBtn" type="button" aria-label="Dates importantes">
            <span class="dock-icon">📅</span>
        </button>

        <button class="dock-btn" id="musicBtn" type="button" aria-label="Musique">
            <span class="dock-icon">🎵</span>
        </button>

        <button class="dock-btn" id="themeBtn" type="button" aria-label="Changer de thème">
            <span class="dock-icon" id="themeIcon">🌙</span>
        </button>
    </div>

    <div class="overlay hidden" id="overlay"></div>

    <aside class="side-panel hidden" id="sidePanel">
        <div class="side-panel-header">
            <div>
                <p class="side-panel-label" id="panelLabel">Infos</p>
                <h3 id="panelTitle">Titre</h3>
            </div>

            <button class="close-panel-btn" id="closePanelBtn" type="button">✕</button>
        </div>

        <div class="side-panel-body" id="panelBody"></div>
    </aside>

    <audio id="loveAudio"></audio>

    <script src="script.js"></script>
    <script src="compliments.js"></script>

    <script>
        const glow = document.querySelector(".cursor-glow");
        let lastHeart = 0;

        document.addEventListener("mousemove", function (e) {
            if (!glow) return;

            glow.style.left = e.clientX + "px";
            glow.style.top = e.clientY + "px";

            const now = Date.now();
            if (now - lastHeart > 80) {
                lastHeart = now;
                createHeart(e.clientX, e.clientY);
            }
        });

        function createHeart(x, y) {
            const heart = document.createElement("div");
            heart.className = "heart-trail";
            heart.textContent = "💖";
            heart.style.left = x + "px";
            heart.style.top = y + "px";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 800);
        }
    </script>
</body>

</html>
