<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeu 3 - Réflexes amoureux</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>">
  <link rel="stylesheet" href="style.css" />
</head>

<body class="game-mode">
  <div class="mouse-glow"></div>
  <div class="hearts-background" id="heartsBackground"></div>

  <main class="game-page">
    <section class="game-panel reveal">
      <div class="section-label">Mini-jeu 03</div>
      <h1 class="game-title">Jeu 3 : Réflexes amoureux 💘</h1>
      <p class="game-subtitle">
        Clique sur le cœur le plus vite possible pour accumuler un maximum de points et débloquer ta récompense finale.
      </p>

      <div class="game-topbar">
        <div class="game-stat">Score jeu : <span id="score">0</span></div>
        <div class="game-stat">Temps : <span id="time">20</span>s</div>
        <div class="game-stat">Total : <span id="totalScore">0</span></div>
      </div>

      <div class="game-actions">
        <button id="startGame" class="game-button">Commencer</button>
        <a href="index.html" class="game-link">Retour à l’accueil</a>
        <a href="jeu1.html" id="restartAll" class="game-link">Recommencer au jeu 1</a>
      </div>
    </section>

    <section id="gameArea" class="game-area reveal delay-1"></section>

    <section class="reward-box hidden" id="rewardBox">
      <div class="section-label">Récompense finale</div>
      <h2>Résultat 💖</h2>
      <p>Total de points : <span id="finalTotal">0</span></p>
      <p id="rewardText"></p>
    </section>
  </main>

  <div class="floating-dock">
    <button class="dock-btn" id="datesBtn" type="button">
      <span class="dock-icon">📅</span>
    </button>

    <button class="dock-btn" id="musicBtn" type="button">
      <span class="dock-icon">🎵</span>
    </button>

    <button class="dock-btn" id="themeBtn" type="button">
      <span class="dock-icon" id="themeIcon">🌙</span>
    </button>
  </div>

  <div class="overlay hidden" id="overlay"></div>

  <aside class="side-panel hidden" id="sidePanel">
    <div class="side-panel-header">
      <div>
        <div class="side-panel-label" id="panelLabel">Panneau</div>
        <h3 id="panelTitle">Titre</h3>
      </div>
      <button class="close-panel-btn" id="closePanelBtn" type="button">✕</button>
    </div>

    <div class="side-panel-body" id="panelBody"></div>
  </aside>

  <audio id="loveAudio"></audio>

  <script src="script.js"></script>
  <script src="jeu3.js"></script>
</body>

</html>
